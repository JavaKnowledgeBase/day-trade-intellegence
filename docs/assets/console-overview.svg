  <text x="125" y="570" font-family="Georgia, serif" font-size="32" fill="#1E2A24">Ready</text>
  <text x="425" y="530" font-family="Georgia, serif" font-size="18" fill="#68756F">12. Positions</text>
  <text x="425" y="570" font-family="Georgia, serif" font-size="32" fill="#1E2A24">1</text>
