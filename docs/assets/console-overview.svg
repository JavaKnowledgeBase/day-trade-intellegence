  <text x="150" y="752" font-family="monospace" font-size="16" fill="#ECFEFF">Response appears in the trade result panel.</text>
  <text x="760" y="725" font-family="monospace" font-size="16" fill="#ECFEFF">Root info, readiness, current user,</text>
  <text x="760" y="752" font-family="monospace" font-size="16" fill="#ECFEFF">and admin system status render here.</text>

  <rect x="100" y="895" width="1180" height="26" rx="10" fill="#F3E9D8"/>
  <text x="115" y="913" font-family="Georgia, serif" font-size="14" fill="#5B4A3A">Below the fold: Positions, Portfolio Summary, Orders, Strategy Runs, and Reconciliation output panels.</text>
