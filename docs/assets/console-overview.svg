  <text x="100" y="140" font-family="Georgia, serif" font-size="42" fill="#1E2A24">Operator Console</text>
  <text x="100" y="178" font-family="Georgia, serif" font-size="20" fill="#68756F">Annotated layout of the built-in console</text>

  <rect x="100" y="220" width="1180" height="145" rx="18" fill="#FFFFFF" stroke="#D8CDBD"/>
  <rect x="130" y="270" width="240" height="48" rx="12" fill="#FFFFFF" stroke="#D8CDBD"/>
