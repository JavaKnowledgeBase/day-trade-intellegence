  <text x="683" y="300" font-family="Georgia, serif" font-size="16" fill="#FFFFFF">3. Login</text>
  <text x="804" y="300" font-family="Georgia, serif" font-size="16" fill="#FFFFFF">4. Logout</text>
  <text x="130" y="342" font-family="Georgia, serif" font-size="16" fill="#166534">5. Login status line: success, warning, or error shows here</text>

