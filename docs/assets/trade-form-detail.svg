<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" fill="none">
  <rect width="1200" height="860" fill="#F6F1E8"/>
  <rect x="70" y="50" width="1060" height="760" rx="28" fill="#FFF9EF" stroke="#D8CDBD" stroke-width="2"/>
  <text x="100" y="105" font-family="Georgia, serif" font-size="36" fill="#1E2A24">Trade Form Detail</text>
  <text x="100" y="138" font-family="Georgia, serif" font-size="18" fill="#68756F">What each field in the submit-signal workflow does</text>

  <rect x="100" y="180" width="1000" height="560" rx="22" fill="#FFFDF8" stroke="#D8CDBD"/>
  <text x="130" y="220" font-family="Georgia, serif" font-size="24" fill="#1E2A24">Trade Submission</text>

  <rect x="130" y="250" width="280" height="84" rx="14" fill="#FFFFFF" stroke="#D8CDBD"/>
  <rect x="440" y="250" width="280" height="84" rx="14" fill="#FFFFFF" stroke="#D8CDBD"/>
  <rect x="750" y="250" width="280" height="84" rx="14" fill="#FFFFFF" stroke="#D8CDBD"/>
  <rect x="130" y="360" width="280" height="84" rx="14" fill="#FFFFFF" stroke="#D8CDBD"/>
  <rect x="440" y="360" width="280" height="84" rx="14" fill="#FFFFFF" stroke="#D8CDBD"/>
  <rect x="750" y="360" width="280" height="84" rx="14" fill="#FFFFFF" stroke="#D8CDBD"/>
  <rect x="130" y="470" width="900" height="66" rx="14" fill="#0F766E"/>
  <rect x="130" y="560" width="900" height="150" rx="16" fill="#1F2937"/>

  <text x="150" y="278" font-family="Georgia, serif" font-size="14" fill="#68756F">1. Symbol</text>
  <text x="150" y="310" font-family="Georgia, serif" font-size="24" fill="#1E2A24">AAPL</text>

  <text x="460" y="278" font-family="Georgia, serif" font-size="14" fill="#68756F">2. Quantity</text>
  <text x="460" y="310" font-family="Georgia, serif" font-size="24" fill="#1E2A24">1</text>

  <text x="770" y="278" font-family="Georgia, serif" font-size="14" fill="#68756F">3. Short Window</text>
  <text x="770" y="310" font-family="Georgia, serif" font-size="24" fill="#1E2A24">5</text>

  <text x="150" y="388" font-family="Georgia, serif" font-size="14" fill="#68756F">4. Long Window</text>
  <text x="150" y="420" font-family="Georgia, serif" font-size="24" fill="#1E2A24">20</text>

  <text x="460" y="388" font-family="Georgia, serif" font-size="14" fill="#68756F">5. Timeframe</text>
  <text x="460" y="420" font-family="Georgia, serif" font-size="24" fill="#1E2A24">1Min</text>

  <text x="770" y="388" font-family="Georgia, serif" font-size="14" fill="#68756F">6. Dry Run</text>
  <text x="770" y="420" font-family="Georgia, serif" font-size="24" fill="#1E2A24">Checked</text>

  <text x="455" y="511" font-family="Georgia, serif" font-size="24" fill="#FFFFFF">7. Submit Signal</text>

  <text x="160" y="594" font-family="monospace" font-size="16" fill="#ECFEFF">8. Trade result panel</text>
  <text x="160" y="624" font-family="monospace" font-size="16" fill="#ECFEFF">Shows the latest response from /api/v1/trading/signal.</text>
  <text x="160" y="654" font-family="monospace" font-size="16" fill="#ECFEFF">In the current demo, successful submission still depends on</text>
  <text x="160" y="684" font-family="monospace" font-size="16" fill="#ECFEFF">Alpaca market-data credentials being configured.</text>

  <text x="100" y="785" font-family="Georgia, serif" font-size="16" fill="#5B4A3A">Recommended demo note: use admin or operator for panel visibility, and treat trade submission as a credential-dependent setup step.</text>
</svg>
